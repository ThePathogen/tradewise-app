<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TradeWise</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--green:#2dff7a;--green-dim:#1a3d2a;--amber:#f0a500;--red:#ff4d4d;--blue:#4da6ff;--bg:#080c08;--card:#0f150f;--border:#1a2e1a;--text:#e8f5e8;--muted:#4a6b4a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono','Courier New',monospace;min-height:100vh;padding-bottom:80px;}
.header{position:sticky;top:0;z-index:100;background:rgba(8,12,8,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:22px 16px 14px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--green);}
.logo span{color:var(--text);}

.content{padding:16px;}
.section-header{font-size:10px;letter-spacing:2px;color:var(--muted);margin:16px 0 8px;}
.signal-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;}
.signal-card.long{border-left:3px solid var(--green);}
.signal-card.short{border-left:3px solid var(--red);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.instrument{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.bias-badge{font-size:10px;letter-spacing:2px;padding:3px 10px;border-radius:4px;}
.bias-badge.long{background:rgba(45,255,122,0.15);color:var(--green);border:1px solid rgba(45,255,122,0.3);}
.bias-badge.short{background:rgba(255,77,77,0.15);color:var(--red);border:1px solid rgba(255,77,77,0.3);}
.card-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.card-label{font-size:10px;color:var(--muted);letter-spacing:1px;}
.conf-bar{background:var(--border);border-radius:2px;height:4px;margin-top:10px;}
.conf-fill{height:100%;border-radius:2px;}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.price-box{background:rgba(255,255,255,0.03);border-radius:6px;padding:8px;}
.price-label{font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:3px;}
.price-value{font-size:13px;font-weight:500;}
.stat-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.pill{font-size:10px;padding:3px 8px;border-radius:12px;background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border);}
.pill.up{color:var(--green);border-color:rgba(45,255,122,0.2);}
.pill.down{color:var(--red);border-color:rgba(255,77,77,0.2);}
.pill.warn{color:var(--amber);border-color:rgba(240,165,0,0.2);}
.ai-box{background:rgba(45,255,122,0.05);border:1px solid rgba(45,255,122,0.15);border-radius:6px;padding:10px;margin-top:10px;font-size:11px;line-height:1.6;}
.ai-label{font-size:9px;color:var(--green);letter-spacing:2px;margin-bottom:6px;}
.summary-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.summary-stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.summary-val{font-family:'Bebas Neue',sans-serif;font-size:28px;}
.summary-label{font-size:9px;letter-spacing:1px;color:var(--muted);}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,12,8,0.97);border-top:1px solid var(--border);display:flex;padding:8px 0 16px;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9px;letter-spacing:1px;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px;}
.nav-btn.active{color:var(--green);}
.nav-icon{font-size:20px;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:8px;color:var(--text);}
.setup-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;}
.setup-label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;}
.setup-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;}
.setup-btn{width:100%;background:var(--green-dim);border:1px solid var(--green);color:var(--green);padding:12px;border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:2px;cursor:pointer;margin-top:8px;}
.history-row{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.history-instrument{font-family:'Bebas Neue',sans-serif;font-size:16px;}
.history-date{font-size:10px;color:var(--muted);margin-top:2px;}
.result-badge{font-size:10px;padding:3px 8px;border-radius:4px;}
.result-badge.correct{background:rgba(45,255,122,0.15);color:var(--green);}
.result-badge.incorrect{background:rgba(255,77,77,0.15);color:var(--red);}
.result-badge.pending{background:rgba(240,165,0,0.15);color:var(--amber);}
</style>
</head>
<body>
<div class="header"><div class="logo">Trade<span>Wise</span></div></div>

<div class="content" id="mainContent">
  <div class="empty"><div class="empty-icon">📊</div><div class="empty-title">LOADING SIGNALS</div><div style="font-size:12px">Fetching from Google Sheets...</div></div>
</div>
<nav class="nav">
  <button class="nav-btn active" onclick="showTab('long')"><span class="nav-icon">📈</span>LONG</button>
  <button class="nav-btn" onclick="showTab('short')"><span class="nav-icon">📉</span>SHORT</button>
  <button class="nav-btn" onclick="showTab('history')"><span class="nav-icon">📋</span>HISTORY</button>
  <button class="nav-btn" onclick="showTab('setup')"><span class="nav-icon">⚙️</span>SETUP</button>
</nav>
<script>
const SID='tw_sheet_id',AID='tw_api_key';
let allData={signals:[],history:[]},currentTab='long';
function getCfg(){return{sheetId:localStorage.getItem(SID)||'',apiKey:localStorage.getItem(AID)||''};}
async function fetchSheet(tab,range){
  const{sheetId,apiKey}=getCfg();if(!sheetId||!apiKey)return[];
  try{const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(tab+'!'+range)}?key=${apiKey}`);const d=await r.json();return d.values||[];}catch(e){return[];}
}
async function loadData(){
  const{sheetId,apiKey}=getCfg();if(!sheetId||!apiKey){showTab('setup');return;}
  const[sigRows,histRows]=await Promise.all([fetchSheet('Signals','A2:P200'),fetchSheet('History','A2:D500')]);
  allData.signals=sigRows.map(r=>({instrument:r[0]||'',bias:r[1]||'',estMove:r[2]||'',startPrice:r[3]||'N/A',endPrice:r[4]||'N/A',stopLoss:r[5]||'N/A',takeProfit:r[6]||'N/A',timeframe:r[7]||'',confidence:r[8]||'50%',histConf:r[9]||'',trend:r[10]||'',rsi:r[11]||'',cot:r[12]||'',season:r[13]||'',news:r[14]||'',aiAnalysis:r[15]||''}));
  allData.history=histRows.map(r=>({date:r[0]||'',instrument:r[1]||'',bias:r[2]||'',result:r[3]||'PENDING'}));
  showTab(currentTab);
}
function confColor(c){const n=parseInt(c)||50;return n>=70?'var(--green)':n>=55?'var(--amber)':'var(--red)';}
function renderCard(s){
  const isL=s.bias==='LONG',cls=isL?'long':'short',conf=parseInt(s.confidence)||50,col=confColor(s.confidence);
  const rsiCls=s.rsi.includes('OB')?'warn':s.rsi.includes('OS')?'up':'';
  const trendCls=s.trend==='Up'?'up':s.trend==='Down'?'down':'';
  const seasonCls=s.season==='Fav'?'up':s.season==='Unf'?'down':'';
  const cotV=parseFloat(s.cot)||0,cotCls=cotV>0.2?'up':cotV<-0.2?'down':'';
  const aiHtml=s.aiAnalysis&&s.aiAnalysis.length>10?`<div class="ai-box"><div class="ai-label">AI ANALYSIS</div>${s.aiAnalysis}</div>`:'';
  return`<div class="signal-card ${cls}">
    <div class="card-header"><div class="instrument">${s.instrument}</div><div class="bias-badge ${cls}">${s.bias}</div></div>
    <div class="card-row"><span class="card-label">CONFIDENCE</span><span style="color:${col}">${s.confidence}</span></div>
    <div class="conf-bar"><div class="conf-fill" style="width:${conf}%;background:${col}"></div></div>
    <div class="price-grid">
      <div class="price-box"><div class="price-label">ENTRY</div><div class="price-value" style="color:var(--text)">${s.startPrice}</div></div>
      <div class="price-box"><div class="price-label">PROJECTED</div><div class="price-value" style="color:var(--amber)">${s.endPrice} <span style="font-size:10px;color:var(--muted)">${s.estMove}</span></div></div>
      <div class="price-box"><div class="price-label">STOP LOSS</div><div class="price-value" style="color:var(--red)">${s.stopLoss}</div></div>
      <div class="price-box"><div class="price-label">TAKE PROFIT</div><div class="price-value" style="color:var(--green)">${s.takeProfit}</div></div>
    </div>
    <div class="stat-pills">
      <span class="pill">⏱ ${s.timeframe}</span>
      <span class="pill ${trendCls}">TREND ${s.trend}</span>
      <span class="pill ${rsiCls}">RSI ${s.rsi}</span>
      <span class="pill ${cotCls}">COT ${s.cot}</span>
      <span class="pill ${seasonCls}">SEASON ${s.season}</span>
      <span class="pill">NEWS ${s.news}</span>
    </div>
    ${aiHtml}
    <div style="font-size:10px;color:var(--muted);margin-top:8px;text-align:right">${s.histConf}</div>
  </div>`;
}
function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));
  document.querySelector(`.nav-btn[onclick="showTab('${tab}')"]`)?.classList.add('active');
  const c=document.getElementById('mainContent');
  const{sheetId,apiKey}=getCfg();
  if(tab==='setup'){
    c.innerHTML=`<div class="setup-card"><div class="setup-label">GOOGLE SHEETS ID</div><input class="setup-input" id="sheetInput" placeholder="Sheet ID..." value="${sheetId}"></div><div class="setup-card"><div class="setup-label">GOOGLE API KEY</div><input class="setup-input" id="apiInput" placeholder="AIzaSy..." value="${apiKey}"></div><button class="setup-btn" onclick="saveSetup()">SAVE & LOAD</button>`;
    return;
  }
  if(!sheetId||!apiKey){c.innerHTML=`<div class="empty"><div class="empty-icon">⚙️</div><div class="empty-title">SETUP REQUIRED</div><div style="font-size:12px">Add your Sheet ID and API key</div></div>`;return;}
  if(tab==='long'){
    const longs=allData.signals.filter(s=>s.bias==='LONG');
    if(!longs.length){c.innerHTML=`<div class="empty"><div class="empty-icon">📈</div><div class="empty-title">NO LONG SIGNALS</div><div style="font-size:12px">Run the trading bot to generate signals</div></div>`;return;}
    const high=longs.filter(s=>parseInt(s.confidence)>=65).length;
    c.innerHTML=`<div class="summary-bar"><div class="summary-stat"><div class="summary-val" style="color:var(--green)">${longs.length}</div><div class="summary-label">LONGS</div></div><div class="summary-stat"><div class="summary-val" style="color:var(--amber)">${high}</div><div class="summary-label">HIGH CONF</div></div><div class="summary-stat"><div class="summary-val" style="color:var(--muted)">${longs.length-high}</div><div class="summary-label">MODERATE</div></div></div><div class="section-header">LONG SIGNALS</div>${longs.sort((a,b)=>parseInt(b.confidence)-parseInt(a.confidence)).map(renderCard).join('')}`;
  }else if(tab==='short'){
    const shorts=allData.signals.filter(s=>s.bias==='SHORT');
    if(!shorts.length){c.innerHTML=`<div class="empty"><div class="empty-icon">📉</div><div class="empty-title">NO SHORT SIGNALS</div><div style="font-size:12px">Run the trading bot to generate signals</div></div>`;return;}
    const high=shorts.filter(s=>parseInt(s.confidence)>=70).length;
    const med=shorts.filter(s=>parseInt(s.confidence)>=55&&parseInt(s.confidence)<70).length;
    const low=shorts.filter(s=>parseInt(s.confidence)<55).length;
    c.innerHTML=`<div class="summary-bar"><div class="summary-stat"><div class="summary-val" style="color:var(--green)">${high}</div><div class="summary-label">HIGH</div></div><div class="summary-stat"><div class="summary-val" style="color:var(--amber)">${med}</div><div class="summary-label">MODERATE</div></div><div class="summary-stat"><div class="summary-val" style="color:var(--muted)">${low}</div><div class="summary-label">LOW</div></div></div><div class="section-header">SHORT SIGNALS</div>${shorts.sort((a,b)=>parseInt(b.confidence)-parseInt(a.confidence)).map(renderCard).join('')}`;
  }else if(tab==='history'){
    if(!allData.history.length){c.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">NO HISTORY YET</div><div style="font-size:12px">Signals will appear here after the bot runs</div></div>`;return;}
    c.innerHTML=`<div class="section-header">SIGNAL HISTORY</div>`+allData.history.slice().reverse().slice(0,50).map(r=>{
      const rc=r.result==='CORRECT'?'correct':r.result==='INCORRECT'?'incorrect':'pending';
      const bc=r.bias==='LONG'?'var(--green)':'var(--red)';
      return`<div class="history-row"><div><div class="history-instrument">${r.instrument}</div><div class="history-date">${r.date} · <span style="color:${bc}">${r.bias}</span></div></div><div class="result-badge ${rc}">${r.result}</div></div>`;
    }).join('');
  }
}
function saveSetup(){
  localStorage.setItem(SID,document.getElementById('sheetInput').value.trim());
  localStorage.setItem(AID,document.getElementById('apiInput').value.trim());
  loadData();
}
loadData();
</script>
</body>
</html>
